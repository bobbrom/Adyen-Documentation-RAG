<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Adyen Docs Assistant</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,400;0,600;1,400&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <!-- markdown rendering -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    :root {
      --bg:          #0d0f12;
      --surface:     #14171c;
      --border:      #1f2530;
      --accent:      #00e096;
      --accent-dim:  #00b876;
      --text:        #d4dbe8;
      --text-muted:  #5a6478;
      --user-bg:     #1a2235;
      --bot-bg:      #111418;
      --code-bg:     #0a0c0f;
      --radius:      10px;
      --font-ui:     'IBM Plex Sans', sans-serif;
      --font-mono:   'IBM Plex Mono', monospace;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-ui);
      font-size: 15px;
      line-height: 1.6;
    }

    /* ── Layout ── */
    .app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      max-width: 860px;
      margin: 0 auto;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 20px 24px 16px;
      border-bottom: 1px solid var(--border);
    }

    .logo {
      width: 32px;
      height: 32px;
      background: var(--accent);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-mono);
      font-weight: 600;
      font-size: 14px;
      color: #000;
      flex-shrink: 0;
    }

    header h1 {
      font-size: 15px;
      font-weight: 500;
      letter-spacing: 0.01em;
    }

    header span {
      font-size: 12px;
      color: var(--text-muted);
      font-family: var(--font-mono);
      margin-left: auto;
    }

    /* ── Messages ── */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      scroll-behavior: smooth;
    }

    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .message {
      display: flex;
      gap: 14px;
      animation: fadeUp 0.2s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .avatar {
      width: 28px;
      height: 28px;
      border-radius: 6px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 600;
      margin-top: 2px;
    }

    .message.user .avatar { background: var(--user-bg); color: var(--accent); border: 1px solid var(--border); }
    .message.bot  .avatar { background: var(--accent); color: #000; }

    .bubble {
      flex: 1;
      background: var(--bot-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 18px;
      font-size: 14px;
      line-height: 1.75;
    }

    .message.user .bubble {
      background: var(--user-bg);
      border-color: #253050;
    }

    /* ── Markdown inside bot bubbles ── */
    .bubble h1, .bubble h2, .bubble h3 {
      font-family: var(--font-mono);
      font-size: 13px;
      font-weight: 600;
      color: var(--accent);
      margin: 16px 0 6px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .bubble h1:first-child,
    .bubble h2:first-child,
    .bubble h3:first-child { margin-top: 0; }

    .bubble p { margin-bottom: 10px; }
    .bubble p:last-child { margin-bottom: 0; }

    .bubble a {
      color: var(--accent);
      text-decoration: none;
      font-family: var(--font-mono);
      font-size: 12px;
      border-bottom: 1px solid var(--accent-dim);
      word-break: break-all;
    }
    .bubble a:hover { color: #fff; border-color: #fff; }

    .bubble code {
      background: var(--code-bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 1px 6px;
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--accent);
    }

    .bubble pre {
      background: var(--code-bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 14px 16px;
      overflow-x: auto;
      margin: 10px 0;
    }
    .bubble pre code {
      background: none;
      border: none;
      padding: 0;
      font-size: 12.5px;
      color: var(--text);
    }

    .bubble ul, .bubble ol {
      padding-left: 20px;
      margin-bottom: 10px;
    }
    .bubble li { margin-bottom: 4px; }

    .bubble strong { color: #fff; font-weight: 500; }

    /* ── Cursor blink during streaming ── */
    .cursor {
      display: inline-block;
      width: 8px;
      height: 14px;
      background: var(--accent);
      vertical-align: middle;
      margin-left: 2px;
      border-radius: 1px;
      animation: blink 0.8s step-end infinite;
    }
    @keyframes blink { 50% { opacity: 0; } }

    /* ── Empty state ── */
    .empty {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: var(--text-muted);
      text-align: center;
      padding: 40px;
    }
    .empty .icon {
      font-size: 36px;
      opacity: 0.4;
    }
    .empty p {
      font-size: 14px;
      max-width: 300px;
    }
    .suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-top: 8px;
    }
    .suggestion {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 12px;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.15s;
      font-family: var(--font-mono);
    }
    .suggestion:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    /* ── Input bar ── */
    .input-bar {
      padding: 16px 24px 20px;
      border-top: 1px solid var(--border);
    }

    .input-wrap {
      display: flex;
      gap: 10px;
      align-items: flex-end;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 12px;
      transition: border-color 0.15s;
    }
    .input-wrap:focus-within { border-color: var(--accent); }

    #question {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      color: var(--text);
      font-family: var(--font-ui);
      font-size: 14px;
      resize: none;
      max-height: 140px;
      line-height: 1.6;
    }
    #question::placeholder { color: var(--text-muted); }

    #send {
      background: var(--accent);
      border: none;
      border-radius: 6px;
      width: 34px;
      height: 34px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s, transform 0.1s;
    }
    #send:hover { background: #00f0a8; }
    #send:active { transform: scale(0.94); }
    #send:disabled { background: var(--border); cursor: not-allowed; }

    #send svg { width: 16px; height: 16px; fill: #000; }

    .hint {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 8px;
      text-align: center;
      font-family: var(--font-mono);
    }
  </style>
</head>
<body>
<div class="app">
  <header>
    <div class="logo">A</div>
    <h1>Adyen Docs Assistant</h1>
    <span>llama3.1:8b · local</span>
  </header>

  <div id="messages">
    <div class="empty" id="empty">
      <div class="icon">⬡</div>
      <p>Ask anything about Adyen's APIs, payment methods, or platform.</p>
      <div class="suggestions">
        <div class="suggestion" onclick="ask(this.textContent)">How do payouts work?</div>
        <div class="suggestion" onclick="ask(this.textContent)">What payment methods are supported?</div>
        <div class="suggestion" onclick="ask(this.textContent)">How do I handle webhooks?</div>
        <div class="suggestion" onclick="ask(this.textContent)">What is the balance platform?</div>
      </div>
    </div>
  </div>

  <div class="input-bar">
    <div class="input-wrap">
      <textarea
        id="question"
        placeholder="Ask about Adyen docs…"
        rows="1"
        autocomplete="off"
      ></textarea>
      <button id="send" onclick="submitQuestion()" title="Send">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
        </svg>
      </button>
    </div>
    <p class="hint">⏎ send &nbsp;·&nbsp; shift+⏎ newline</p>
  </div>
</div>

<script>
  const messagesEl = document.getElementById('messages');
  const questionEl = document.getElementById('question');
  const sendBtn    = document.getElementById('send');
  const emptyEl    = document.getElementById('empty');

  // Auto-grow textarea
  questionEl.addEventListener('input', () => {
    questionEl.style.height = 'auto';
    questionEl.style.height = questionEl.scrollHeight + 'px';
  });

  // Enter to send, Shift+Enter for newline
  questionEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      submitQuestion();
    }
  });

  function ask(text) {
    questionEl.value = text;
    submitQuestion();
  }

  function appendMessage(role, html = '') {
    emptyEl.style.display = 'none';

    const msg = document.createElement('div');
    msg.className = `message ${role}`;

    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = role === 'user' ? 'you' : 'ai';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.innerHTML = html;

    msg.appendChild(avatar);
    msg.appendChild(bubble);
    messagesEl.appendChild(msg);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return bubble;
  }

  async function submitQuestion() {
    const question = questionEl.value.trim();
    if (!question || sendBtn.disabled) return;

    // Reset input
    questionEl.value = '';
    questionEl.style.height = 'auto';
    sendBtn.disabled = true;

    // Show user message
    appendMessage('user', marked.parse(question));

    // Show bot bubble with blinking cursor
    const botBubble = appendMessage('bot', '<span class="cursor"></span>');
    let raw = '';

    try {
      const res = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ question })
      });

      const reader = res.body.getReader();
      const decoder = new TextDecoder();

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        const lines = decoder.decode(value).split('\n');
        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          const payload = line.slice(6);
          if (payload === '[DONE]') break;
          try {
            const { token } = JSON.parse(payload);
            raw += token;
            // Re-render markdown as tokens stream in
            botBubble.innerHTML = marked.parse(raw);
            messagesEl.scrollTop = messagesEl.scrollHeight;
          } catch {}
        }
      }

      // Final render — ensure no cursor leftover
      botBubble.innerHTML = marked.parse(raw);

    } catch (err) {
      botBubble.innerHTML = `<span style="color:#ff6b6b">⚠ Error: ${err.message}</span>`;
    }

    sendBtn.disabled = false;
    questionEl.focus();
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }
</script>
</body>
</html>
